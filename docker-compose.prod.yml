# ─────────────────────────────────────────────────────────────
#  EECMI Platform — PRODUCTION compose
#
#  Data lives in MongoDB Atlas (MONGODB_URI in .env) — no local
#  database container needed.
#
#  Usage:
#    docker compose -f docker-compose.prod.yml up --build -d
#    docker compose -f docker-compose.prod.yml down
# ─────────────────────────────────────────────────────────────

services:

  # ── Express API ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: eecmi_api_prod
    restart: always
    env_file: .env                  # loads MONGODB_URI, CLERK_*, etc.
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    # Port NOT exposed to host — nginx proxies to it

  # ── Nginx + React Build ──────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production            # compiles React → nginx serves static files
      args:
        REACT_APP_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    container_name: eecmi_client_prod
    restart: always
    ports:
      - "80:80"                     # public HTTP
      # - "443:443"                 # uncomment after adding SSL certs
    depends_on:
      - api
